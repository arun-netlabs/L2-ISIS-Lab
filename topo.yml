name: isis-lab

mgmt:
  network: clab-mgmt
  ipv4-subnet: 172.31.31.0/24

topology:
  nodes:
    R1:
      kind: ceos
      image: ceos:latest
      startup-config: configs/R1.cfg
      mgmt-ipv4: 172.31.31.11
    R2:
      kind: ceos
      image: ceos:latest
      startup-config: configs/R2.cfg
      mgmt-ipv4: 172.31.31.12
    R3:
      kind: ceos
      image: ceos:latest
      startup-config: configs/R3.cfg
      mgmt-ipv4: 172.31.31.13
    R4:
      kind: ceos
      image: ceos:latest
      startup-config: configs/R4.cfg
      mgmt-ipv4: 172.31.31.14
    R5:
      kind: ceos
      image: ceos:latest
      startup-config: configs/R5.cfg
      mgmt-ipv4: 172.31.31.15

  links:
    # R1 Et1 <-> R2 Et1
    - endpoints: ["R1:eth1", "R2:eth1"]

    # R2 Et2 <-> R3 Et2
    - endpoints: ["R2:eth2", "R3:eth2"]

    # R2 Et3 <-> R3 Et3
    - endpoints: ["R2:eth3", "R3:eth3"]

    # R3 Et4 <-> R4 Et4
    - endpoints: ["R3:eth4", "R4:eth4"]

    # R3 Et5 <-> R4 Et5
    - endpoints: ["R3:eth5", "R4:eth5"]

    # R4 Et1 <-> R5 Et1
    - endpoints: ["R4:eth1", "R5:eth1"]
